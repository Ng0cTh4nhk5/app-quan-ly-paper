spring:
  application:
    name: rgms-backend

  # Active profile — overrides from application-{profile}.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Virtual Threads (Java 21) — handles burst concurrent load efficiently
  threads:
    virtual:
      enabled: true

  # JPA — delegate DDL to Flyway, never auto-manage schema
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  # Flyway — auto-run migrations on startup
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # File upload limits (NFR-02)
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

# Actuator — health endpoint only (expand per need)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# Application-level constants
rgms:
  jwt:
    expiration-ms: 28800000   # 8 hours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  login:
    max-attempts: 5
    lock-duration-seconds: 900  # 15 minutes
  advance:
    default-max-rate: 0.5       # 50% — overridable per contract

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
