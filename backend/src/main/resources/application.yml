server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      force-response: true

spring:
  application:
    name: rgms-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rgms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:whYlonElY0!}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 1025
    username: ''
    password: ''
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyMustBeAtLeast32Bytes}
    expiration-ms: 86400000
  upload:
    dir: ./uploads
  mail:
    from: noreply@rgms.edu.vn
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
